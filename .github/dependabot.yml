version: 2

updates:
  # Keep Pi packages in lockstep, but reduce update churn from daily patch releases.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    allow:
      - dependency-name: "@earendil-works/pi-ai"
      - dependency-name: "@earendil-works/pi-web-ui"
      - dependency-name: "@earendil-works/pi-agent-core"
    groups:
      pi-stack:
        patterns:
          - "@earendil-works/pi-ai"
          - "@earendil-works/pi-web-ui"
          - "@earendil-works/pi-agent-core"
        update-types:
          - "minor"
          - "patch"

  # Keep other npm dependencies fresh (security + bugfixes).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@earendil-works/pi-ai"
      - dependency-name: "@earendil-works/pi-web-ui"
      - dependency-name: "@earendil-works/pi-agent-core"
    groups:
      npm-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Keep GitHub Actions versions fresh
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
